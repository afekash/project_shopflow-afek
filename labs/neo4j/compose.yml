# Single Neo4j instance lab.
# Backs materials/nosql/08-graph-deep-dive/ lessons 01-06.
# Merges with labs/base/compose.yml -- do not duplicate the workspace service here.
#
# Usage: make lab-neo4j

services:
  workspace:
    build:
      args:
        LAB: neo4j
    environment:
      - NEO4J_HOST=neo4j
      - NEO4J_BOLT_PORT=7687
      - NEO4J_HTTP_PORT=7474
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

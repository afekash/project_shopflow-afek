# Redis Sentinel lab: 3 Redis nodes (redis-1 starts as primary) + 3 sentinels.
# Backs materials/nosql/07-key-value-deep-dive/04-replication.md
# Merges with labs/base/compose.yml -- do not duplicate the workspace service here.
#
# Nodes are named redis-1/2/3 rather than redis-primary/replica because roles
# are not fixed -- any node can become primary after a failover.
#
# Usage: make lab-redis-sentinel

services:
  workspace:
    build:
      args:
        LAB: redis-sentinel
    environment:
      - REDIS_HOST=redis-1
      - REDIS_PORT=6379
      - REDIS_SENTINEL_HOST=redis-sentinel-1
      - REDIS_SENTINEL_PORT=26379
    depends_on:
      redis-1:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy

  redis-1:
    image: redis:7-alpine
    container_name: redis-1
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-2:
    image: redis:7-alpine
    container_name: redis-2
    command: redis-server --replicaof redis-1 6379 --appendonly yes
    depends_on:
      redis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-3:
    image: redis:7-alpine
    container_name: redis-3
    command: redis-server --replicaof redis-1 6379 --appendonly yes
    depends_on:
      redis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-sentinel-1:
    build:
      context: ../redis-sentinel
      dockerfile: Dockerfile.sentinel
    container_name: redis-sentinel-1
    depends_on:
      redis-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-sentinel-2:
    build:
      context: ../redis-sentinel
      dockerfile: Dockerfile.sentinel
    container_name: redis-sentinel-2
    depends_on:
      redis-1:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-3:
    build:
      context: ../redis-sentinel
      dockerfile: Dockerfile.sentinel
    container_name: redis-sentinel-3
    depends_on:
      redis-1:
        condition: service_healthy
    restart: unless-stopped

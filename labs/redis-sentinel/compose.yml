# Redis Sentinel lab: 1 primary + 2 replicas + 3 sentinels.
# Backs materials/nosql/07-key-value-deep-dive/04-replication.md
# Merges with labs/base/compose.yml -- do not duplicate the workspace service here.
#
# Usage: make lab-redis-sentinel

services:
  workspace:
    build:
      args:
        LAB: redis-sentinel
    environment:
      - REDIS_PRIMARY_HOST=redis-primary
      - REDIS_PRIMARY_PORT=6379
      - REDIS_SENTINEL_HOST=redis-sentinel-1
      - REDIS_SENTINEL_PORT=26379
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy

  redis-primary:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-replica-1:
    image: redis:7-alpine
    command: redis-server --replicaof redis-primary 6379 --appendonly yes
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-replica-2:
    image: redis:7-alpine
    command: redis-server --replicaof redis-primary 6379 --appendonly yes
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-primary 6379 2' > /tmp/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 15000' >> /tmp/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
             redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-primary 6379 2' > /tmp/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 15000' >> /tmp/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
             redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-primary:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "echo 'sentinel monitor mymaster redis-primary 6379 2' > /tmp/sentinel.conf &&
             echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
             echo 'sentinel failover-timeout mymaster 15000' >> /tmp/sentinel.conf &&
             echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
             redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-primary:
        condition: service_healthy
    restart: unless-stopped
